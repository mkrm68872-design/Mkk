<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>منصة تعليمية متكاملة | أكاديمية النجاح</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Tajawal', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: rgba(255,255,255,0.95);
            border-radius: 30px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            overflow: hidden;
            min-height: 90vh;
        }

        .header {
            background: #2d3748;
            color: white;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 20px;
            background: rgba(255,255,255,0.1);
            padding: 8px 20px;
            border-radius: 50px;
        }

        .btn-logout {
            background: #e53e3e;
            border: none;
            color: white;
            padding: 8px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-logout:hover {
            background: #c53030;
            transform: scale(1.05);
        }

        .main-content {
            padding: 30px;
        }

        .form-container {
            max-width: 500px;
            margin: 50px auto;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        .form-container h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #2d3748;
        }

        input, select {
            width: 100%;
            padding: 12px 15px;
            margin: 10px 0;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 16px;
            transition: 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .toggle-form {
            text-align: center;
            margin-top: 20px;
        }

        .toggle-form span {
            color: #667eea;
            cursor: pointer;
            font-weight: bold;
        }

        .courses-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            margin-top: 30px;
        }

        .course-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: 0.3s;
            cursor: pointer;
        }

        .course-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        .course-image {
            background: linear-gradient(135deg, #667eea, #764ba2);
            height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
        }

        .course-info {
            padding: 20px;
        }

        .course-title {
            font-size: 22px;
            font-weight: 800;
            margin-bottom: 10px;
        }

        .course-price {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
            margin: 10px 0;
        }

        .purchase-btn {
            background: #48bb78;
            width: auto;
            padding: 8px 20px;
            font-size: 14px;
        }

        .watch-btn {
            background: #ed8936;
            width: auto;
            padding: 8px 20px;
            font-size: 14px;
        }

        .admin-panel {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-top: 20px;
            margin-bottom: 30px;
        }

        .admin-section {
            margin-bottom: 30px;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 20px;
        }

        .students-table {
            width: 100%;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px;
            text-align: right;
            border-bottom: 1px solid #e2e8f0;
        }

        th {
            background: #f7fafc;
            font-weight: 800;
        }

        .admin-btn {
            width: auto;
            padding: 5px 12px;
            font-size: 12px;
            margin: 2px;
            display: inline-block;
        }

        .btn-danger {
            background: #e53e3e;
        }

        .btn-warning {
            background: #ed8936;
        }

        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }

        .badge-blocked {
            background: #fed7d7;
            color: #742a2a;
        }

        .badge-active {
            background: #c6f6d5;
            color: #22543d;
        }

        .loading {
            text-align: center;
            padding: 50px;
            font-size: 20px;
        }

        @media (max-width: 768px) {
            .courses-grid {
                grid-template-columns: 1fr;
            }
            .header {
                flex-direction: column;
            }
            table {
                font-size: 12px;
            }
        }
    </style>
</head>
<body>

<div class="container" id="app">
    <div class="header">
        <div class="logo">📚 منصة تعليمية | أكاديمية النجاح</div>
        <div id="userHeaderInfo"></div>
    </div>
    <div class="main-content" id="mainContent">
        <div class="loading">⏳ جاري تحميل المنصة...</div>
    </div>
</div>

<script>
    // ------------------- Firebase Configuration -------------------
    const firebaseConfig = {
        apiKey: "AIzaSyDQs1-RAW00so7ouBbRsCvEdwXQfWd1izU",
        authDomain: "tryyyyy-23508.firebaseapp.com",
        projectId: "tryyyyy-23508",
        storageBucket: "tryyyyy-23508.firebasestorage.app",
        messagingSenderId: "913680144851",
        appId: "1:913680144851:web:54c6b76e6634c603fc3726",
        measurementId: "G-99QRMSG8Z6"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // ------------------- Global Variables -------------------
    let currentUser = null;
    let studentsRef = null;
    let purchasesRef = null;

    // تعريف الكورسات لكل صف
    const grades = {
        "3اعدادي": {
            name: "الصف الثالث الإعدادي",
            courses: [
                { id: "c1", name: "اللغة العربية", price: 150, image: "📖", branches: 5, videosPerBranch: 20 },
                { id: "c2", name: "الرياضيات", price: 150, image: "🧮", branches: 5, videosPerBranch: 20 },
                { id: "c3", name: "العلوم", price: 150, image: "🔬", branches: 5, videosPerBranch: 20 },
                { id: "c4", name: "الدراسات الاجتماعية", price: 150, image: "🌍", branches: 5, videosPerBranch: 20 },
                { id: "c5", name: "اللغة الإنجليزية", price: 150, image: "🇬🇧", branches: 5, videosPerBranch: 20 }
            ]
        },
        "1ثانوي": {
            name: "الصف الأول الثانوي",
            courses: [
                { id: "c6", name: "اللغة العربية", price: 180, image: "📖", branches: 5, videosPerBranch: 20 },
                { id: "c7", name: "الرياضيات", price: 180, image: "🧮", branches: 5, videosPerBranch: 20 },
                { id: "c8", name: "الفيزياء", price: 180, image: "⚡", branches: 5, videosPerBranch: 20 },
                { id: "c9", name: "الكيمياء", price: 180, image: "🧪", branches: 5, videosPerBranch: 20 },
                { id: "c10", name: "الأحياء", price: 180, image: "🧬", branches: 5, videosPerBranch: 20 }
            ]
        },
        "2ثانوي": {
            name: "الصف الثاني الثانوي",
            courses: [
                { id: "c11", name: "اللغة العربية", price: 200, image: "📖", branches: 5, videosPerBranch: 20 },
                { id: "c12", name: "الرياضيات", price: 200, image: "🧮", branches: 5, videosPerBranch: 20 },
                { id: "c13", name: "الفيزياء", price: 200, image: "⚡", branches: 5, videosPerBranch: 20 },
                { id: "c14", name: "الكيمياء", price: 200, image: "🧪", branches: 5, videosPerBranch: 20 },
                { id: "c15", name: "التاريخ", price: 200, image: "📜", branches: 5, videosPerBranch: 20 }
            ]
        }
    };

    // توليد كود فريد
    function generateUniqueCode() {
        return 'STU' + Math.floor(100000 + Math.random() * 900000);
    }

    // إنشاء حساب أدمن تلقائي إذا لم يوجد
    async function ensureAdminAccount() {
        const adminCheck = await database.ref('students').orderByChild('role').equalTo('admin').once('value');
        if (!adminCheck.exists()) {
            const adminId = Date.now();
            await database.ref('students/' + adminId).set({
                id: adminId,
                name: "Administrator",
                password: "admin123",
                email: "admin@platform.com",
                role: "admin",
                isBlocked: false,
                code: "ADMIN001",
                phone: "01000000000",
                grade: "1ثانوي",
                createdAt: new Date().toISOString()
            });
        }
    }

    // تسجيل طالب جديد
    async function registerStudent(name, password, grade, phone, email) {
        const emailCheck = await database.ref('students').orderByChild('email').equalTo(email).once('value');
        if (emailCheck.exists()) {
            alert("البريد الإلكتروني موجود مسبقاً!");
            return false;
        }
        const code = generateUniqueCode();
        const newId = Date.now();
        const studentData = {
            id: newId,
            name,
            password,
            grade,
            phone,
            email,
            code,
            isBlocked: false,
            role: "student",
            createdAt: new Date().toISOString()
        };
        await database.ref('students/' + newId).set(studentData);
        alert(`✅ تم إنشاء حساب بنجاح!\n🎫 كودك الفريد هو: ${code}\nاحتفظ به للرجوع إليه.`);
        return true;
    }

    // تسجيل الدخول
    async function loginStudent(emailOrCode, password) {
        let snapshot = await database.ref('students').orderByChild('email').equalTo(emailOrCode).once('value');
        if (!snapshot.exists()) {
            snapshot = await database.ref('students').orderByChild('code').equalTo(emailOrCode).once('value');
        }
        
        if (snapshot.exists()) {
            let student = null;
            snapshot.forEach(child => { student = child.val(); });
            if (student.password === password && !student.isBlocked) {
                currentUser = student;
                localStorage.setItem('currentUserId', currentUser.id);
                alert(`مرحباً ${student.name}`);
                renderApp();
                return true;
            } else if (student.isBlocked) {
                alert("🚫 حسابك محظور! تواصل مع الإدارة.");
                return false;
            } else {
                alert("كلمة المرور غير صحيحة!");
                return false;
            }
        }
        alert("❌ لم يتم العثور على حساب بهذه البيانات");
        return false;
    }

    // شراء كورس
    async function purchaseCourse(courseId, price) {
        if (!currentUser) return;
        const purchaseCheck = await database.ref(`purchases/${currentUser.id}/${courseId}`).once('value');
        if (purchaseCheck.exists()) {
            alert("你已经购买了该课程!");
            return;
        }
        if (confirm(`💰 شراء الكورس بسعر ${price} جنيه؟ (محاكاة دفع)`)) {
            await database.ref(`purchases/${currentUser.id}/${courseId}`).set({
                courseId: courseId,
                purchasedAt: new Date().toISOString(),
                price: price
            });
            alert("✅ تم شراء الكورس بنجاح! يمكنك الآن مشاهدة المحتوى.");
            renderApp();
        }
    }

    // إضافة طالب بواسطة الأدمن (ريل تايم)
    async function adminAddStudent(name, password, grade, phone, email) {
        const emailCheck = await database.ref('students').orderByChild('email').equalTo(email).once('value');
        if (emailCheck.exists()) {
            alert("البريد موجود مسبقاً");
            return false;
        }
        const code = generateUniqueCode();
        const newId = Date.now();
        await database.ref('students/' + newId).set({
            id: newId, name, password, grade, phone, email, code,
            isBlocked: false, role: "student", createdAt: new Date().toISOString()
        });
        alert(`✅ تم إضافة الطالب ${name} بنجاح، كود الطالب: ${code}`);
        return true;
    }

    // حظر/فك حظر طالب
    async function toggleBlockStudent(studentId) {
        const studentRef = database.ref(`students/${studentId}`);
        const snapshot = await studentRef.once('value');
        const student = snapshot.val();
        if (student) {
            await studentRef.update({ isBlocked: !student.isBlocked });
            if (currentUser && currentUser.id == studentId && !student.isBlocked) {
                // تم حظر المستخدم الحالي
                currentUser = null;
                localStorage.removeItem('currentUserId');
                renderApp();
                alert("🚫 تم حظر حسابك، تواصل مع الإدارة.");
            } else {
                alert(`✅ تم ${student.isBlocked ? 'فك الحظر عن' : 'حظر'} الطالب`);
            }
        }
    }

    // فتح كورس لطالب معين
    async function adminUnlockCourse(studentId, courseId) {
        const exists = await database.ref(`purchases/${studentId}/${courseId}`).once('value');
        if (!exists.exists()) {
            await database.ref(`purchases/${studentId}/${courseId}`).set({
                courseId: courseId,
                purchasedAt: new Date().toISOString(),
                price: 0,
                unlockedByAdmin: true
            });
            alert("✅ تم فتح الكورس للطالب بنجاح!");
        } else {
            alert("⚠️ الكورس مفتوح بالفعل!");
        }
    }

    // تعديل بيانات الطالب
    async function adminEditStudent(studentId, newName, newPhone, newGrade) {
        await database.ref(`students/${studentId}`).update({
            name: newName,
            phone: newPhone,
            grade: newGrade
        });
        alert("✅ تم تحديث بيانات الطالب");
        if (currentUser && currentUser.id == studentId) {
            currentUser.name = newName;
            currentUser.phone = newPhone;
            currentUser.grade = newGrade;
            localStorage.setItem('currentUserId', currentUser.id);
        }
    }

    // مشاهدة الكورس
    window.watchCourse = async function(courseId, courseName) {
        if (!currentUser) return;
        const purchaseCheck = await database.ref(`purchases/${currentUser.id}/${courseId}`).once('value');
        if (!purchaseCheck.exists()) {
            alert("يجب شراء الكورس أولاً!");
            return;
        }
        let videoHTML = `<h3>🎬 ${courseName} - محتوى تعليمي (فيديوهات نموذجية)</h3>`;
        videoHTML += `<div style="display:grid; gap:20px;">`;
        for (let i = 1; i <= 5; i++) {
            videoHTML += `
                <div style="background:#f7fafc; padding:15px; border-radius:15px;">
                    <h4>📘 الفصل ${i}</h4>
                    <div style="display:grid; grid-template-columns:repeat(auto-fill,minmax(250px,1fr)); gap:10px;">
            `;
            for (let v = 1; v <= 5; v++) {
                videoHTML += `
                    <div>
                        <iframe width="100%" height="180" src="https://www.youtube.com/embed/dQw4w9WgXcQ?si=example" title="فيديو تعليمي" frameborder="0" allowfullscreen></iframe>
                        <p style="margin-top:5px">📹 فيديو ${v} : شرح الدرس</p>
                    </div>
                `;
            }
            videoHTML += `</div></div>`;
        }
        videoHTML += `</div><button onclick="renderApp()" class="btn-logout" style="margin-top:20px;">⬅️ رجوع للكورسات</button>`;
        document.getElementById("mainContent").innerHTML = videoHTML;
    };

    // عرض الكورسات للطالب
    async function renderStudentCourses() {
        if (!currentUser || currentUser.role !== 'student') return "<div class='loading'>📚 جاري تحميل الكورسات...</div>";
        const gradeData = grades[currentUser.grade];
        if (!gradeData) return "<p>⚠️ لم يتم تعيين صف لك</p>";
        
        const purchasesSnapshot = await database.ref(`purchases/${currentUser.id}`).once('value');
        const purchasedCourses = purchasesSnapshot.val() || {};
        
        let html = `<h2>📚 كورسات ${gradeData.name}</h2><div class="courses-grid">`;
        gradeData.courses.forEach(course => {
            const isPurchased = purchasedCourses[course.id];
            html += `
                <div class="course-card">
                    <div class="course-image">${course.image}</div>
                    <div class="course-info">
                        <div class="course-title">${course.name}</div>
                        <div class="course-price">${course.price} جنيه</div>
                        <div>📁 ${course.branches} فصول | 🎥 ${course.videosPerBranch} فيديو لكل فصل</div>
                        ${isPurchased ? `<button class="watch-btn" onclick="watchCourse('${course.id}','${course.name}')">▶️ مشاهدة الكورس</button>` : `<button class="purchase-btn" onclick="purchaseCourse('${course.id}',${course.price})">💰 شراء الكورس</button>`}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        return html;
    }

    // لوحة تحكم الأدمن (مع إضافة طالب)
    async function renderAdminPanel() {
        const studentsSnapshot = await database.ref('students').once('value');
        const allStudents = [];
        studentsSnapshot.forEach(child => { allStudents.push(child.val()); });
        
        let html = `
            <div class="admin-panel">
                <h2><i class="fas fa-user-shield"></i> 👑 لوحة تحكم الأدمن - ريل تايم</h2>
                <div class="admin-section">
                    <h3>➕ إضافة طالب جديد</h3>
                    <input type="text" id="adminName" placeholder="الاسم الكامل">
                    <input type="password" id="adminPassword" placeholder="الرقم السري">
                    <select id="adminGrade">
                        <option value="3اعدادي">3 إعدادي</option>
                        <option value="1ثانوي">1 ثانوي</option>
                        <option value="2ثانوي">2 ثانوي</option>
                    </select>
                    <input type="text" id="adminPhone" placeholder="رقم الهاتف">
                    <input type="email" id="adminEmail" placeholder="البريد الإلكتروني">
                    <button onclick="addStudentByAdmin()">➕ إضافة طالب</button>
                </div>
                <div class="admin-section">
                    <h3>📋 قائمة الطلاب (${allStudents.length})</h3>
                    <div class="students-table">
                        <table>
                            <thead><tr><th>الاسم</th><th>الكود</th><th>الصف</th><th>الهاتف</th><th>البريد</th><th>الحالة</th><th>إجراءات</th></tr></thead>
                            <tbody>
                                ${allStudents.filter(s => s.role !== 'admin').map(s => `
                                    <tr>
                                        <td>${s.name}</td><td>${s.code}</td><td>${s.grade}</td><td>${s.phone}</td><td>${s.email}</td>
                                        <td><span class="badge ${s.isBlocked ? 'badge-blocked' : 'badge-active'}">${s.isBlocked ? '🚫 محظور' : '✅ نشط'}</span></td>
                                        <td>
                                            <button class="admin-btn btn-danger" onclick="toggleBlockStudent(${s.id})">${s.isBlocked ? 'فك الحظر' : 'حظر'}</button>
                                            <button class="admin-btn btn-warning" onclick="showUnlockCourse(${s.id})">🔓 فتح كورس</button>
                                            <button class="admin-btn" onclick="showEditStudent(${s.id})">✏️ تعديل</button>
                                        </td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        `;
        return html;
    }

    window.addStudentByAdmin = async function() {
        const name = document.getElementById('adminName')?.value;
        const password = document.getElementById('adminPassword')?.value;
        const grade = document.getElementById('adminGrade')?.value;
        const phone = document.getElementById('adminPhone')?.value;
        const email = document.getElementById('adminEmail')?.value;
        if (!name || !password || !grade || !phone || !email) {
            alert("يرجى ملء جميع الحقول");
            return;
        }
        await adminAddStudent(name, password, grade, phone, email);
        renderApp();
    };

    window.showUnlockCourse = async function(studentId) {
        const studentSnap = await database.ref(`students/${studentId}`).once('value');
        const student = studentSnap.val();
        const courses = grades[student?.grade]?.courses || [];
        const courseId = prompt(`اختر ID الكورس لفتحه:\n${courses.map(c => `${c.id}: ${c.name}`).join('\n')}`);
        if (courseId) adminUnlockCourse(studentId, courseId);
    };

    window.showEditStudent = async function(studentId) {
        const studentSnap = await database.ref(`students/${studentId}`).once('value');
        const student = studentSnap.val();
        const newName = prompt("الاسم الجديد:", student.name);
        const newPhone = prompt("رقم الهاتف الجديد:", student.phone);
        const newGrade = prompt("الصف الجديد (3اعدادي / 1ثانوي / 2ثانوي):", student.grade);
        if (newName && newPhone && newGrade) await adminEditStudent(studentId, newName, newPhone, newGrade);
        renderApp();
    };

    // تسجيل الخروج
    function logout() {
        currentUser = null;
        localStorage.removeItem('currentUserId');
        renderApp();
    }

    // واجهة تسجيل الدخول
    function renderAuth() {
        return `
            <div class="form-container">
                <h2>🔐 تسجيل الدخول</h2>
                <input type="text" id="loginEmail" placeholder="البريد الإلكتروني أو الكود">
                <input type="password" id="loginPassword" placeholder="الرقم السري">
                <button onclick="handleLogin()">دخول</button>
                <div class="toggle-form"><span onclick="showRegister()">✨ إنشاء حساب جديد</span></div>
                <hr style="margin:20px 0">
                <h4>👑 حساب الأدمن التجريبي</h4>
                <p>البريد: admin@platform.com | كلمة السر: admin123</p>
                <button onclick="adminLogin()">تسجيل دخول كأدمن</button>
            </div>
        `;
    }

    function renderRegister() {
        return `
            <div class="form-container">
                <h2>📝 إنشاء حساب جديد</h2>
                <input type="text" id="regName" placeholder="الاسم الكامل">
                <input type="password" id="regPassword" placeholder="الرقم السري">
                <select id="regGrade">
                    <option value="3اعدادي">الصف الثالث الإعدادي</option>
                    <option value="1ثانوي">الصف الأول الثانوي</option>
                    <option value="2ثانوي">الصف الثاني الثانوي</option>
                </select>
                <input type="tel" id="regPhone" placeholder="رقم الهاتف">
                <input type="email" id="regEmail" placeholder="البريد الإلكتروني">
                <button onclick="handleRegister()">إنشاء حساب</button>
                <div class="toggle-form"><span onclick="showLogin()">🔐 لدي حساب بالفعل</span></div>
            </div>
        `;
    }

    window.handleLogin = async function() {
        const email = document.getElementById('loginEmail').value;
        const pwd = document.getElementById('loginPassword').value;
        await loginStudent(email, pwd);
    };
    window.handleRegister = async function() {
        const name = document.getElementById('regName').value;
        const pwd = document.getElementById('regPassword').value;
        const grade = document.getElementById('regGrade').value;
        const phone = document.getElementById('regPhone').value;
        const email = document.getElementById('regEmail').value;
        if (!name || !pwd || !grade || !phone || !email) {
            alert("جميع الحقول مطلوبة");
            return;
        }
        await registerStudent(name, pwd, grade, phone, email);
        showLogin();
    };
    window.adminLogin = async function() {
        await ensureAdminAccount();
        const snapshot = await database.ref('students').orderByChild('email').equalTo('admin@platform.com').once('value');
        let admin = null;
        snapshot.forEach(child => { admin = child.val(); });
        if (admin) {
            currentUser = admin;
            localStorage.setItem('currentUserId', currentUser.id);
            renderApp();
        }
    };
    window.showRegister = function() { renderApp('register'); };
    window.showLogin = function() { renderApp('login'); };
    window.toggleBlockStudent = toggleBlockStudent;
    window.logout = logout;

    async function renderApp(page = null) {
        const storedId = localStorage.getItem('currentUserId');
        if (storedId && !currentUser) {
            const snap = await database.ref(`students/${storedId}`).once('value');
            if (snap.exists()) currentUser = snap.val();
        }
        
        const headerUser = currentUser ? `<div class="user-info"><span>👋 ${currentUser.name} ${currentUser.role === 'admin' ? '(أدمن)' : ''}</span><button class="btn-logout" onclick="logout()">تسجيل خروج</button></div>` : `<div></div>`;
        document.getElementById('userHeaderInfo').innerHTML = headerUser;
        
        let mainHtml = "";
        if (!currentUser) {
            if (page === 'register') mainHtml = renderRegister();
            else mainHtml = renderAuth();
        } else {
            if (currentUser.role === 'admin') {
                mainHtml = await renderAdminPanel() + await renderStudentCourses();
            } else {
                mainHtml = await renderStudentCourses();
            }
        }
        document.getElementById('mainContent').innerHTML = mainHtml;
    }

    ensureAdminAccount().then(() => renderApp());
</script>
</body>
</html>
