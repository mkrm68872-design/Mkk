<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>منصة تعليمية متكاملة | تعلم الآن</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Tajawal', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        /* Container */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: rgba(255,255,255,0.95);
            border-radius: 30px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            overflow: hidden;
            min-height: 90vh;
        }

        /* Header */
        .header {
            background: #2d3748;
            color: white;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 20px;
            background: rgba(255,255,255,0.1);
            padding: 8px 20px;
            border-radius: 50px;
        }

        .btn-logout {
            background: #e53e3e;
            border: none;
            color: white;
            padding: 8px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-logout:hover {
            background: #c53030;
            transform: scale(1.05);
        }

        /* Main Content */
        .main-content {
            padding: 30px;
        }

        /* Forms */
        .form-container {
            max-width: 500px;
            margin: 50px auto;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        .form-container h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #2d3748;
        }

        input, select {
            width: 100%;
            padding: 12px 15px;
            margin: 10px 0;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 16px;
            transition: 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .toggle-form {
            text-align: center;
            margin-top: 20px;
        }

        .toggle-form span {
            color: #667eea;
            cursor: pointer;
            font-weight: bold;
        }

        /* Cards */
        .courses-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            margin-top: 30px;
        }

        .course-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: 0.3s;
            cursor: pointer;
            position: relative;
        }

        .course-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        .course-image {
            background: linear-gradient(135deg, #667eea, #764ba2);
            height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
        }

        .course-info {
            padding: 20px;
        }

        .course-title {
            font-size: 22px;
            font-weight: 800;
            margin-bottom: 10px;
        }

        .course-price {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
            margin: 10px 0;
        }

        .locked {
            background: #e2e8f0;
            color: #718096;
        }

        .purchase-btn {
            background: #48bb78;
            width: auto;
            padding: 8px 20px;
            font-size: 14px;
        }

        /* Admin Panel */
        .admin-panel {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-top: 20px;
        }

        .admin-section {
            margin-bottom: 30px;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 20px;
        }

        .students-table {
            width: 100%;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px;
            text-align: right;
            border-bottom: 1px solid #e2e8f0;
        }

        th {
            background: #f7fafc;
            font-weight: 800;
        }

        .admin-btn {
            width: auto;
            padding: 5px 12px;
            font-size: 12px;
            margin: 2px;
            display: inline-block;
        }

        .btn-danger {
            background: #e53e3e;
        }

        .btn-warning {
            background: #ed8936;
        }

        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }

        .badge-paid {
            background: #c6f6d5;
            color: #22543d;
        }

        .badge-free {
            background: #fed7d7;
            color: #742a2a;
        }

        @media (max-width: 768px) {
            .courses-grid {
                grid-template-columns: 1fr;
            }
            .header {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

<div class="container" id="app">
    <!-- Header -->
    <div class="header">
        <div class="logo">📚 منصة تعليمية | أكاديمية النجاح</div>
        <div id="userHeaderInfo"></div>
    </div>

    <div class="main-content" id="mainContent"></div>
</div>

<script>
    // ------------------- البيانات الأساسية -------------------
    let students = JSON.parse(localStorage.getItem('students')) || [];
    let currentUser = JSON.parse(localStorage.getItem('currentUser')) || null;
    let purchasedCourses = JSON.parse(localStorage.getItem('purchasedCourses')) || {};

    // تعريف الكورسات لكل صف
    const grades = {
        "3اعدادي": {
            name: "الصف الثالث الإعدادي",
            courses: [
                { id: "c1", name: "اللغة العربية", price: 150, image: "📖", branches: 5, videosPerBranch: 20 },
                { id: "c2", name: "الرياضيات", price: 150, image: "🧮", branches: 5, videosPerBranch: 20 },
                { id: "c3", name: "العلوم", price: 150, image: "🔬", branches: 5, videosPerBranch: 20 },
                { id: "c4", name: "الدراسات الاجتماعية", price: 150, image: "🌍", branches: 5, videosPerBranch: 20 },
                { id: "c5", name: "اللغة الإنجليزية", price: 150, image: "🇬🇧", branches: 5, videosPerBranch: 20 }
            ]
        },
        "1ثانوي": {
            name: "الصف الأول الثانوي",
            courses: [
                { id: "c6", name: "اللغة العربية", price: 180, image: "📖", branches: 5, videosPerBranch: 20 },
                { id: "c7", name: "الرياضيات", price: 180, image: "🧮", branches: 5, videosPerBranch: 20 },
                { id: "c8", name: "الفيزياء", price: 180, image: "⚡", branches: 5, videosPerBranch: 20 },
                { id: "c9", name: "الكيمياء", price: 180, image: "🧪", branches: 5, videosPerBranch: 20 },
                { id: "c10", name: "الأحياء", price: 180, image: "🧬", branches: 5, videosPerBranch: 20 }
            ]
        },
        "2ثانوي": {
            name: "الصف الثاني الثانوي",
            courses: [
                { id: "c11", name: "اللغة العربية", price: 200, image: "📖", branches: 5, videosPerBranch: 20 },
                { id: "c12", name: "الرياضيات", price: 200, image: "🧮", branches: 5, videosPerBranch: 20 },
                { id: "c13", name: "الفيزياء", price: 200, image: "⚡", branches: 5, videosPerBranch: 20 },
                { id: "c14", name: "الكيمياء", price: 200, image: "🧪", branches: 5, videosPerBranch: 20 },
                { id: "c15", name: "التاريخ", price: 200, image: "📜", branches: 5, videosPerBranch: 20 }
            ]
        }
    };

    // توليد كود فريد
    function generateUniqueCode() {
        let code;
        do {
            code = 'STU' + Math.floor(100000 + Math.random() * 900000);
        } while (students.some(s => s.code === code));
        return code;
    }

    // تسجيل الطالب
    function registerStudent(name, password, grade, phone, email) {
        if (students.some(s => s.email === email)) {
            alert("البريد الإلكتروني موجود مسبقاً!");
            return false;
        }
        const code = generateUniqueCode();
        students.push({
            id: Date.now(),
            name,
            password,
            grade,
            phone,
            email,
            code,
            isBlocked: false,
            role: "student",
            createdAt: new Date().toISOString()
        });
        localStorage.setItem('students', JSON.stringify(students));
        alert(`تم إنشاء حساب بنجاح! كودك الفريد هو: ${code} . احتفظ به للرجوع إليه.`);
        return true;
    }

    // تسجيل الدخول
    function loginStudent(emailOrCode, password) {
        const user = students.find(s => (s.email === emailOrCode || s.code === emailOrCode) && s.password === password && !s.isBlocked);
        if (user) {
            currentUser = user;
            localStorage.setItem('currentUser', JSON.stringify(currentUser));
            alert(`مرحباً ${user.name}`);
            renderApp();
            return true;
        } else {
            alert("بيانات غير صحيحة أو الحساب محظور!");
            return false;
        }
    }

    // تسجيل الخروج
    function logout() {
        currentUser = null;
        localStorage.removeItem('currentUser');
        renderApp();
    }

    // شراء كورس
    function purchaseCourse(courseId, price) {
        if (!currentUser) return;
        if (!purchasedCourses[currentUser.id]) purchasedCourses[currentUser.id] = [];
        if (purchasedCourses[currentUser.id].includes(courseId)) {
            alert("你已经购买了该课程!");
            return;
        }
        if (confirm(`شراء الكورس بسعر ${price} جنيه؟ (محاكاة دفع)`)) {
            purchasedCourses[currentUser.id].push(courseId);
            localStorage.setItem('purchasedCourses', JSON.stringify(purchasedCourses));
            alert("تم شراء الكورس بنجاح! يمكنك الآن مشاهدة المحتوى.");
            renderApp();
        }
    }

    // إضافة طالب بواسطة الأدمن
    function adminAddStudent(name, password, grade, phone, email) {
        if (students.some(s => s.email === email)) {
            alert("البريد موجود مسبقاً");
            return false;
        }
        const code = generateUniqueCode();
        students.push({
            id: Date.now(),
            name,
            password,
            grade,
            phone,
            email,
            code,
            isBlocked: false,
            role: "student"
        });
        localStorage.setItem('students', JSON.stringify(students));
        alert(`تم إضافة الطالب ${name} بنجاح، كود الطالب: ${code}`);
        renderApp();
        return true;
    }

    // حظر طالب
    function toggleBlockStudent(studentId) {
        const student = students.find(s => s.id == studentId);
        if (student) {
            student.isBlocked = !student.isBlocked;
            localStorage.setItem('students', JSON.stringify(students));
            if (currentUser && currentUser.id == studentId && student.isBlocked) {
                logout();
                alert("تم حظر حسابك، تواصل مع الإدارة.");
            } else {
                renderApp();
            }
        }
    }

    // فتح كورس لطالب معين
    function adminUnlockCourse(studentId, courseId) {
        if (!purchasedCourses[studentId]) purchasedCourses[studentId] = [];
        if (!purchasedCourses[studentId].includes(courseId)) {
            purchasedCourses[studentId].push(courseId);
            localStorage.setItem('purchasedCourses', JSON.stringify(purchasedCourses));
            alert("تم فتح الكورس للطالب بنجاح!");
            renderApp();
        } else {
            alert("الكورس مفتوح بالفعل!");
        }
    }

    // تعديل بيانات الطالب
    function adminEditStudent(studentId, newName, newPhone, newGrade) {
        const student = students.find(s => s.id == studentId);
        if (student) {
            student.name = newName;
            student.phone = newPhone;
            student.grade = newGrade;
            localStorage.setItem('students', JSON.stringify(students));
            alert("تم تحديث بيانات الطالب");
            renderApp();
        }
    }

    // عرض الكورسات للطالب الحالي
    function renderStudentCourses() {
        if (!currentUser) return "";
        const gradeData = grades[currentUser.grade];
        if (!gradeData) return "<p>لم يتم تعيين صف لك</p>";
        const userPurchased = purchasedCourses[currentUser.id] || [];
        
        let html = `<h2>📚 كورسات ${gradeData.name}</h2><div class="courses-grid">`;
        gradeData.courses.forEach(course => {
            const isPurchased = userPurchased.includes(course.id);
            html += `
                <div class="course-card">
                    <div class="course-image">${course.image}</div>
                    <div class="course-info">
                        <div class="course-title">${course.name}</div>
                        <div class="course-price">${course.price} جنيه</div>
                        <div>📁 ${course.branches} فصول | 🎥 ${course.videosPerBranch} فيديو لكل فصل</div>
                        ${isPurchased ? `<button class="watch-btn" onclick="watchCourse('${course.id}','${course.name}')">▶️ مشاهدة الكورس</button>` : `<button class="purchase-btn" onclick="purchaseCourse('${course.id}',${course.price})">💰 شراء الكورس</button>`}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        return html;
    }

    // مشاهدة الكورس (محاكاة الفيديوهات باستخدام YouTube embed)
    window.watchCourse = function(courseId, courseName) {
        if (!currentUser) return;
        const userPurchased = purchasedCourses[currentUser.id] || [];
        if (!userPurchased.includes(courseId)) {
            alert("يجب شراء الكورس أولاً!");
            return;
        }
        let videoHTML = `<h3>🎬 ${courseName} - محتوى تعليمي (فيديوهات نموذجية من YouTube)</h3>`;
        videoHTML += `<div style="display:grid; gap:20px;">`;
        for (let i = 1; i <= 5; i++) {
            videoHTML += `
                <div style="background:#f7fafc; padding:15px; border-radius:15px;">
                    <h4>الفصل ${i}</h4>
                    <div style="display:grid; grid-template-columns:repeat(auto-fill,minmax(250px,1fr)); gap:10px;">
            `;
            for (let v = 1; v <= 5; v++) {
                videoHTML += `
                    <div>
                        <iframe width="100%" height="180" src="https://www.youtube.com/embed/dQw4w9WgXcQ?si=example" title="فيديو تعليمي" frameborder="0" allowfullscreen></iframe>
                        <p style="margin-top:5px">📹 فيديو ${v} : شرح درس مهم</p>
                    </div>
                `;
            }
            videoHTML += `</div></div>`;
        }
        videoHTML += `</div><button onclick="renderApp()" class="btn-logout" style="margin-top:20px;">⬅️ رجوع</button>`;
        document.getElementById("mainContent").innerHTML = videoHTML;
    };

    // لوحة تحكم الأدمن مع إمكانية إضافة طلاب
    function renderAdminPanel() {
        if (!currentUser || currentUser.role !== 'admin') return "";
        return `
            <div class="admin-panel">
                <h2><i class="fas fa-user-shield"></i> لوحة تحكم الأدمن</h2>
                <div class="admin-section">
                    <h3>➕ إضافة طالب جديد (يدوي)</h3>
                    <input type="text" id="adminName" placeholder="الاسم الكامل">
                    <input type="password" id="adminPassword" placeholder="الرقم السري">
                    <select id="adminGrade">
                        <option value="3اعدادي">3 إعدادي</option>
                        <option value="1ثانوي">1 ثانوي</option>
                        <option value="2ثانوي">2 ثانوي</option>
                    </select>
                    <input type="text" id="adminPhone" placeholder="رقم الهاتف">
                    <input type="email" id="adminEmail" placeholder="البريد الإلكتروني">
                    <button onclick="addStudentByAdmin()">➕ إضافة طالب</button>
                </div>
                <div class="admin-section">
                    <h3>📋 قائمة الطلاب</h3>
                    <div class="students-table">
                        <table>
                            <thead>
                                <tr><th>الاسم</th><th>الكود</th><th>الصف</th><th>الهاتف</th><th>البريد</th><th>حالة</th><th>إجراءات</th></tr>
                            </thead>
                            <tbody>
                                ${students.map(s => `
                                    <tr>
                                        <td>${s.name}</td>
                                        <td>${s.code}</td>
                                        <td>${s.grade}</td>
                                        <td>${s.phone}</td>
                                        <td>${s.email}</td>
                                        <td>${s.isBlocked ? '<span class="badge">🚫 محظور</span>' : '<span class="badge">✅ نشط</span>'}</td>
                                        <td>
                                            <button class="admin-btn btn-danger" onclick="toggleBlockStudent(${s.id})">${s.isBlocked ? 'فك الحظر' : 'حظر'}</button>
                                            <button class="admin-btn btn-warning" onclick="showUnlockCourse(${s.id})">🔓 فتح كورس</button>
                                            <button class="admin-btn" onclick="showEditStudent(${s.id})">✏️ تعديل</button>
                                        </td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        `;
    }

    // دوال مساعدة للأدمن
    window.addStudentByAdmin = function() {
        const name = document.getElementById('adminName')?.value;
        const password = document.getElementById('adminPassword')?.value;
        const grade = document.getElementById('adminGrade')?.value;
        const phone = document.getElementById('adminPhone')?.value;
        const email = document.getElementById('adminEmail')?.value;
        if (!name || !password || !grade || !phone || !email) {
            alert("يرجى ملء جميع الحقول");
            return;
        }
        adminAddStudent(name, password, grade, phone, email);
    };

    window.showUnlockCourse = function(studentId) {
        const grade = students.find(s => s.id == studentId)?.grade;
        const courses = grades[grade]?.courses || [];
        let courseOptions = courses.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
        const courseId = prompt(`اختر ID الكورس لفتحه للطالب:\n${courses.map(c => `${c.id}: ${c.name}`).join('\n')}`);
        if (courseId) adminUnlockCourse(studentId, courseId);
    };

    window.showEditStudent = function(studentId) {
        const student = students.find(s => s.id == studentId);
        const newName = prompt("الاسم الجديد:", student.name);
        const newPhone = prompt("رقم الهاتف الجديد:", student.phone);
        const newGrade = prompt("الصف الجديد (3اعدادي / 1ثانوي / 2ثانوي):", student.grade);
        if (newName && newPhone && newGrade) adminEditStudent(studentId, newName, newPhone, newGrade);
    };

    // صفحات تسجيل الدخول
    function renderAuth() {
        return `
            <div class="form-container">
                <h2>🔐 تسجيل الدخول</h2>
                <input type="text" id="loginEmail" placeholder="البريد الإلكتروني أو الكود">
                <input type="password" id="loginPassword" placeholder="الرقم السري">
                <button onclick="handleLogin()">دخول</button>
                <div class="toggle-form"><span onclick="showRegister()">✨ إنشاء حساب جديد</span></div>
                <hr style="margin:20px 0">
                <h4>👑 حساب الأدمن التجريبي</h4>
                <p>البريد: admin@platform.com | كلمة السر: admin123</p>
                <button onclick="adminLogin()">تسجيل دخول كأدمن</button>
            </div>
        `;
    }

    function renderRegister() {
        return `
            <div class="form-container">
                <h2>📝 إنشاء حساب جديد</h2>
                <input type="text" id="regName" placeholder="الاسم الكامل">
                <input type="password" id="regPassword" placeholder="الرقم السري">
                <select id="regGrade">
                    <option value="3اعدادي">الصف الثالث الإعدادي</option>
                    <option value="1ثانوي">الصف الأول الثانوي</option>
                    <option value="2ثانوي">الصف الثاني الثانوي</option>
                </select>
                <input type="tel" id="regPhone" placeholder="رقم الهاتف">
                <input type="email" id="regEmail" placeholder="البريد الإلكتروني">
                <button onclick="handleRegister()">إنشاء حساب</button>
                <div class="toggle-form"><span onclick="showLogin()">🔐 لدي حساب بالفعل</span></div>
            </div>
        `;
    }

    // المعالجات العامة
    window.handleLogin = function() {
        const email = document.getElementById('loginEmail').value;
        const pwd = document.getElementById('loginPassword').value;
        loginStudent(email, pwd);
    };
    window.handleRegister = function() {
        const name = document.getElementById('regName').value;
        const pwd = document.getElementById('regPassword').value;
        const grade = document.getElementById('regGrade').value;
        const phone = document.getElementById('regPhone').value;
        const email = document.getElementById('regEmail').value;
        if (!name || !pwd || !grade || !phone || !email) {
            alert("جميع الحقول مطلوبة");
            return;
        }
        registerStudent(name, pwd, grade, phone, email);
        showLogin();
    };
    window.adminLogin = function() {
        if (!students.some(s => s.role === 'admin')) {
            students.push({
                id: 999,
                name: "Administrator",
                password: "admin123",
                email: "admin@platform.com",
                role: "admin",
                isBlocked: false,
                code: "ADMIN001"
            });
            localStorage.setItem('students', JSON.stringify(students));
        }
        const adminAcc = students.find(s => s.role === 'admin');
        currentUser = adminAcc;
        localStorage.setItem('currentUser', JSON.stringify(currentUser));
        renderApp();
    };
    window.showRegister = function() { renderApp('register'); };
    window.showLogin = function() { renderApp('login'); };
    window.toggleBlockStudent = toggleBlockStudent;

    function renderApp(page = null) {
        const headerUser = currentUser ? `<div class="user-info"><span>👋 ${currentUser.name} ${currentUser.role === 'admin' ? '(أدمن)' : ''}</span><button class="btn-logout" onclick="logout()">تسجيل خروج</button></div>` : `<div></div>`;
        document.getElementById('userHeaderInfo').innerHTML = headerUser;
        let mainHtml = "";
        if (!currentUser) {
            if (page === 'register') mainHtml = renderRegister();
            else mainHtml = renderAuth();
        } else {
            if (currentUser.role === 'admin') {
                mainHtml = renderAdminPanel() + renderStudentCourses(); // الأدمن يرى الطلاب والكورسات
            } else {
                mainHtml = renderStudentCourses();
            }
        }
        document.getElementById('mainContent').innerHTML = mainHtml;
    }

    // التحقق من وجود أدمن تلقائي
    if (!students.some(s => s.role === 'admin')) {
        students.push({
            id: 999,
            name: "Administrator",
            password: "admin123",
            email: "admin@platform.com",
            role: "admin",
            isBlocked: false,
            code: "ADMIN001",
            phone: "01000000000"
        });
        localStorage.setItem('students', JSON.stringify(students));
    }

    renderApp();
</script>
</body>
</html>
